services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radvault

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radvault

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radvault

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET};
      exit 0;
      "
    networks:
      - radvault

  orthanc:
    image: orthancteam/orthanc:latest-full
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ORTHANC__AWS_S3_STORAGE__ENDPOINT: http://minio:9000
      ORTHANC__AWS_S3_STORAGE__BUCKET_NAME: ${MINIO_BUCKET}
      ORTHANC__AWS_S3_STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER}
      ORTHANC__AWS_S3_STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ORTHANC__AWS_S3_STORAGE__VIRTUAL_ADDRESSING: 'false'
    volumes:
      - ./infra/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8042/system > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - radvault

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orthanc:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_BUCKET: ${MINIO_BUCKET}
      ORTHANC_URL: ${ORTHANC_URL}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRY: ${JWT_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - radvault

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      REDIS_URL: ${REDIS_URL}
    networks:
      - radvault

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      NEXT_PUBLIC_API_URL: http://localhost:3000
      HOSTNAME: 0.0.0.0
      PORT: '3000'
    ports:
      - '3001:3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:3000 > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - radvault

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - radvault

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - '3002:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - radvault

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'
      - '4318:4318'
    networks:
      - radvault

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:

networks:
  radvault:
    name: radvault
    driver: bridge
